        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <div class="breadcrumb">
                    <a href="admindashboard.html">Home</a> / <a href="adminproducts.html">Products</a> / Add Product
                </div>
                <div class="user-info">
                    <img src="Logo.jpeg" alt="Admin User">
                    <span>Welcome Admin</span>
                </div>
            </div>

            <!-- Product Form -->
            <div class="product-form-container">
                <h2 class="form-title">Add New Product</h2>
                <form id="addProductForm" action="add_product.php" method="POST" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productId">Product ID</label>
                            <input type="text" id="productId" name="productId" required>
                        </div>
                        <div class="form-group">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName" name="productName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" name="productCategory" required>
                                <option value="">Select Category</option>
                                <option value="indoor">Indoor Plants</option>
                                <option value="outdoor">Outdoor Plants</option>
                                <option value="succulents">Succulents</option>
                                <option value="flowers">Flowering Plants</option>
                                <option value="herbs">Herbs</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="productPrice">Price (Rs.)</label>
                            <input type="number" id="productPrice" name="productPrice" min="0" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productStock">Stock Quantity</label>
                            <input type="number" id="productStock" name="productStock" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="productStatus">Status</label>
                            <select id="productStatus" name="productStatus" required>
                                <option value="in_stock">In Stock</option>
                                <option value="low_stock">Low Stock</option>
                                <option value="out_of_stock">Out of Stock</option>
                            </select>
                        </div>
                    </div>

                    <!-- <div class="form-group">
                        <label for="productDescription">Description</label>
                        <textarea id="productDescription" name="productDescription"></textarea>
                    </div> -->

                    <div class="form-group">
                        <label>Product Image</label>
                        <div class="image-upload" id="imageUpload">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click to upload product image</p>
                            <input type="file" id="productImage" name="productImage" accept="image/*" style="display: none;">
                            <img id="imagePreview" alt="Preview">
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Add Product</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Image upload preview
        document.getElementById('imageUpload').addEventListener('click', function() {
            document.getElementById('productImage').click();
        });

        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
